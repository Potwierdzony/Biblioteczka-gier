<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteczka Gier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1F2A24;
    --card: #F0EAD9;
    --card-alt: #E6DFC8;
    --border: #3A4A3E;
    --border-card: #C9BFA5;
    --gold: #B8935F;
    --green: #4F7A57;
    --red: #A8483A;
    --muted: #6B7A70;
    --ink: #1F2A24;
    --ink-muted: #6B6555;
    --label: #8A8270;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .display { font-family: 'Fraunces', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
  .eyebrow { display:flex; align-items:center; gap:8px; margin-bottom:4px; color: var(--gold); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  h1 { color: var(--card); font-weight: 600; font-size: 40px; margin: 0; }
  .sub { color: var(--muted); font-size: 12px; margin-top: 8px; }

  .btn { border: none; cursor: pointer; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 10px 16px; display:inline-flex; align-items:center; gap:6px; }
  .btn-gold { background: var(--gold); color: var(--bg); font-weight: 500; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gold); }
  .btn-dark { background: var(--ink); color: var(--card); font-weight: 500; }
  .btn-green { background: var(--green); color: var(--card); font-weight: 500; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .header-actions { display:flex; gap:8px; align-items:center; }

  .search-wrap { position: relative; margin-bottom: 24px; }
  .search-wrap input {
    width: 100%; padding: 12px 12px 12px 36px; border-radius: 6px;
    background: #25322B; border: 1px solid var(--border); color: var(--card); font-size: 14px; outline:none;
  }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .empty { text-align: center; padding: 60px 0; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

  .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-top { padding: 16px 16px 12px; display:flex; justify-content:space-between; gap:12px; border-bottom: 1px dashed var(--border-card); }
  .card-top-main { display:flex; gap:12px; min-width:0; }
  .card-thumb { width: 56px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-card); flex-shrink: 0; background: var(--card-alt); }
  .card-thumb-placeholder { width: 56px; height: 72px; border-radius: 6px; border: 1px dashed var(--border-card); flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size: 20px; color: var(--label); background: var(--card-alt); }
  .card-top h3 { margin:0; color: var(--ink); font-size: 20px; font-weight: 600; }
  .card-top p { margin: 4px 0 0; color: var(--ink-muted); font-size: 12px; }
  .card-top a.bgg-link { display:inline-flex; align-items:center; gap:4px; margin-top: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold); text-decoration: none; }
  .card-top a.bgg-link:hover { text-decoration: underline; }
  .edit-btn { background:none; border:none; cursor:pointer; color: var(--label); padding: 4px; flex-shrink: 0; }

  .card-body { padding: 12px 16px; }
  .status-row { display:flex; justify-content:space-between; align-items:center; }
  .status-available { color: var(--green); font-size: 12px; font-family: 'JetBrains Mono', monospace; display:flex; align-items:center; gap:6px; }
  .status-borrowed { color: var(--gold); font-size: 12px; font-family: 'JetBrains Mono', monospace; display:flex; align-items:center; gap:6px; }
  .status-overdue { color: var(--red); }
  .borrow-info { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4A4536; margin-top: 8px; line-height: 1.6; }
  .borrow-info b { color: var(--ink); font-weight: 500; }

  .card-footer { padding: 10px 16px; background: var(--card-alt); display:flex; justify-content:space-between; align-items:center; }
  .card-footer span { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--label); }
  .qr-btn { background: none; border: none; cursor: pointer; display:flex; align-items:center; gap:6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(15,20,17,0.7); display:flex; align-items:center; justify-content:center; padding: 16px; z-index: 100; }
  .modal { background: var(--card); border-radius: 10px; width: 100%; max-width: 380px; overflow:hidden; }
  .modal-head { padding: 16px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px dashed var(--border-card); }
  .modal-head h2 { margin:0; font-size: 18px; color: var(--ink); font-weight: 600; }
  .modal-head button { background:none; border:none; cursor:pointer; color: var(--label); }
  .modal-body { padding: 16px 20px; display:flex; flex-direction:column; gap:12px; }
  .field label { font-family:'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing:0.05em; color: var(--label); }
  .field input {
    width: 100%; margin-top: 4px; padding: 8px 10px; border-radius: 6px;
    border: 1px solid var(--border-card); font-size: 14px; outline: none; font-family: 'Inter', sans-serif; color: var(--ink);
  }
  .field input[type="file"] { padding: 6px 8px; font-size: 12px; }
  .file-preview-row { display:flex; align-items:center; gap:10px; margin-top: 6px; }
  .file-preview-row img { width: 44px; height: 58px; object-fit: cover; border-radius: 5px; border: 1px solid var(--border-card); }
  .file-preview-row button { background:none; border:none; cursor:pointer; color: var(--red); font-family:'JetBrains Mono', monospace; font-size: 11px; }
  .field-hint { font-size: 11px; color: var(--label); margin-top: 3px; }
  .modal-foot { padding: 16px 20px; border-top: 1px dashed var(--border-card); display:flex; justify-content:space-between; align-items:center; }
  .delete-link { background:none; border:none; cursor:pointer; color: var(--red); font-family:'JetBrains Mono', monospace; font-size:12px; display:flex; align-items:center; gap:5px; }

  .qr-body { padding: 24px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .qr-body img { border-radius: 6px; }
  .qr-url { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--label); text-align:center; word-break: break-all; padding: 0 8px; }
  .qr-hint { font-size: 12px; color: var(--ink-muted); text-align:center; padding: 0 16px; }

  .save-error { margin-bottom: 20px; padding: 8px 16px; border-radius: 6px; background: #3A2320; color: #E8A99B; font-family:'JetBrains Mono', monospace; font-size: 12px; }
  .config-error { max-width: 900px; margin: 60px auto; padding: 24px; background: #F0EAD9; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #1F2A24; line-height: 1.7; }
  .config-error code { background: #E6DFC8; padding: 2px 6px; border-radius: 4px; }
  .sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#4F7A57; margin-right:6px; }
  .sync-dot.offline { background: #A8483A; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">🎲 <span>Katalog wypożyczeń</span></div>
      <h1 class="display">Biblioteczka Gier</h1>

<script>
const CONFIGURED = !Object.values(firebaseConfig).some(v => String(v).startsWith("WKLEJ_TUTAJ"));

if (!CONFIGURED) {
  document.querySelector('.wrap').innerHTML = `
    <div class="config-error">
      <b>⚠️ Baza danych nie jest jeszcze skonfigurowana.</b><br><br>
      Otwórz ten plik w edytorze tekstu, znajdź sekcję <code>firebaseConfig</code> na początku pliku
      i podmień wartości <code>WKLEJ_TUTAJ_...</code> na dane skopiowane z konsoli Firebase
      (Project settings → General → Twoja aplikacja webowa).
    </div>`;
} else {

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const gamesRef = db.ref('games');

function uid() { return Math.random().toString(36).slice(2, 10); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) {
  if (!d) return "—";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("pl-PL", { day: "2-digit", month: "short", year: "numeric" });
}
function daysUntil(d) {
  if (!d) return null;
  const today = new Date(todayStr() + "T00:00:00");
  const target = new Date(d + "T00:00:00");
  return Math.round((target - today) / 86400000);
}

let games = [];
let query = "";
let firstLoad = true;

function writeGames() {
  gamesRef.set(games).catch(() => {
    document.getElementById('saveErrorBox').style.display = 'block';
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || "";
  return div.innerHTML;
}

function resizeImageFile(file, maxWidth) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Nie udało się odczytać pliku'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Nieprawidłowy plik graficzny'));
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function extractBggId(url) {
  const m = String(url).match(/boardgamegeek\.com\/(?:boardgame|boardgameexpansion)\/(\d+)/i);
  return m ? m[1] : null;
}

async function fetchBggCover(bggUrl) {
  const id = extractBggId(bggUrl);
  if (!id) throw new Error('To nie wygląda na link do gry na BoardGameGeek (np. boardgamegeek.com/boardgame/12345/nazwa)');
  const apiUrl = `https://boardgamegeek.com/xmlapi2/thing?id=${id}`;
  const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;
  const res = await fetch(proxyUrl);
  if (!res.ok) throw new Error('Serwer BGG lub proxy nie odpowiedział');
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, 'text/xml');
  const imageEl = xml.querySelector('image');
  if (!imageEl || !imageEl.textContent.trim()) throw new Error('Nie znaleziono zdjęcia dla tej gry');
  return imageEl.textContent.trim();
}



function shareUrl(id) {
  const base = window.location.href.split("#")[0];
  return base + "#g-" + id;
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const q = query.trim().toLowerCase();
  const filtered = games.filter(g =>
    !q || g.name.toLowerCase().includes(q) || (g.borrower || "").toLowerCase().includes(q)
  );

  const out = games.filter(g => g.status === 'borrowed').length;
  document.getElementById('subCount').innerHTML =
    `<span class="sync-dot" id="syncDot"></span>${games.length} pozycji w katalogu · ${out} obecnie wypożyczonych`;

  if (filtered.length === 0) {
    empty.style.display = 'block';
    empty.textContent = games.length === 0 ? 'Katalog jest pusty. Dodaj pierwszą grę.' : 'Brak wyników.';
    grid.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(g => {
    const overdue = g.status === 'borrowed' && g.dueDate && daysUntil(g.dueDate) < 0;
    const statusHtml = g.status === 'available'
      ? `<div class="status-row">
           <span class="status-available">✓ Dostępna</span>
           <button class="btn btn-dark" onclick="openBorrow('${g.id}')">Wypożycz</button>
         </div>`
      : `<div>
           <div class="status-row">
             <span class="status-borrowed ${overdue ? 'status-overdue' : ''}">${overdue ? '⚠ Zaległy zwrot' : '⏱ Wypożyczona'}</span>
             <button class="btn btn-green" onclick="returnGame('${g.id}')">↺ Zwrot</button>
           </div>
           <div class="borrow-info">
             Kto: <b>${escapeHtml(g.borrower)}</b><br>
             Od: ${fmtDate(g.borrowedDate)}${g.dueDate ? ' · do: ' + fmtDate(g.dueDate) : ''}
           </div>
         </div>`;

    return `
      <div class="card" id="card-${g.id}">
        <div class="card-top">
          <div class="card-top-main">
            ${g.coverImage
              ? `<img class="card-thumb" src="${g.coverImage}" alt="Okładka">`
              : `<div class="card-thumb-placeholder">🎲</div>`}
            <div style="min-width:0">
              <h3 class="display">${escapeHtml(g.name)}</h3>
              ${g.notes ? `<p>${escapeHtml(g.notes)}</p>` : ''}
              ${g.bggUrl ? `<a class="bgg-link" href="${escapeHtml(g.bggUrl)}" target="_blank" rel="noopener">🔗 Zasady / opis gry</a>` : ''}
            </div>
          </div>
          <button class="edit-btn" onclick="openEdit('${g.id}')" title="Edytuj">✎</button>
        </div>
        <div class="card-body">${statusHtml}</div>
        <div class="card-footer">
          <span>#${g.id}</span>
          <button class="qr-btn" onclick="openQr('${g.id}')">▦ Kod QR</button>
        </div>
      </div>
    `;
  }).join('');
}

function openModal(html) {
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay" id="overlay">${html}</div>`;
  document.getElementById('overlay').addEventListener('click', (e) => {
    if (e.target.id === 'overlay') closeModal();
  });
}
function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

function openAdd() {
  let pendingCover = "";
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">Nowa gra</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>Nazwa gry</label><input id="f-name" placeholder="np. Nemesis: Odwet" autofocus></div>
        <div class="field">
          <label>Link (np. BoardGameGeek)</label>
          <input id="f-bgg" type="url" placeholder="https://boardgamegeek.com/boardgame/...">
          <div class="file-preview-row" style="margin-top:6px">
            <button type="button" class="btn btn-outline" id="f-bgg-fetch" style="padding:6px 10px">⬇ Pobierz okładkę z BGG</button>
          </div>
          <div class="field-hint" id="f-bgg-status"></div>
        </div>
        <div class="field">
          <label>Zdjęcie okładki (opcjonalnie, ręcznie)</label>
          <input id="f-cover" type="file" accept="image/*">
          <div class="file-preview-row" id="f-cover-preview" style="display:none">
            <img id="f-cover-img" src="" alt="Podgląd"><button type="button" id="f-cover-clear">Usuń zdjęcie</button>
          </div>
          <div class="field-hint">Zdjęcie zostanie automatycznie pomniejszone.</div>
        </div>
        <div class="field"><label>Notatka (opcjonalnie)</label><input id="f-notes" placeholder="np. brakuje 1 kości"></div>
      </div>
      <div class="modal-foot" style="justify-content:flex-end">
        <button class="btn btn-dark" id="f-save">Zapisz</button>
      </div>
    </div>
  `);
  document.getElementById('f-bgg-fetch').onclick = async () => {
    const url = document.getElementById('f-bgg').value.trim();
    const statusEl = document.getElementById('f-bgg-status');
    statusEl.style.color = '';
    statusEl.textContent = 'Szukam okładki...';
    try {
      const imgUrl = await fetchBggCover(url);
      pendingCover = imgUrl;
      document.getElementById('f-cover-img').src = imgUrl;
      document.getElementById('f-cover-preview').style.display = 'flex';
      statusEl.textContent = '✓ Znaleziono okładkę';
    } catch (err) {
      statusEl.style.color = '#A8483A';
      statusEl.textContent = '⚠ ' + err.message + ' — możesz wgrać zdjęcie ręcznie poniżej.';
    }
  };
  document.getElementById('f-cover').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      pendingCover = await resizeImageFile(file, 240);
      document.getElementById('f-cover-img').src = pendingCover;
      document.getElementById('f-cover-preview').style.display = 'flex';
    } catch (err) {
      alert('Nie udało się wczytać zdjęcia: ' + err.message);
    }
  };
  document.getElementById('f-cover-clear').onclick = () => {
    pendingCover = "";
    document.getElementById('f-cover').value = "";
    document.getElementById('f-cover-preview').style.display = 'none';
  };
  document.getElementById('f-save').onclick = () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return;
    const notes = document.getElementById('f-notes').value.trim();
    const bggUrl = document.getElementById('f-bgg').value.trim();
    games.push({ id: uid(), name, status: 'available', borrower: '', borrowedDate: '', dueDate: '', notes, bggUrl, coverImage: pendingCover });
    closeModal();
    writeGames();
  };
}

function openEdit(id) {
  const g = games.find(x => x.id === id);
  let pendingCover = g.coverImage || "";
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">Edytuj grę</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>Nazwa gry</label><input id="f-name" value="${escapeHtml(g.name)}" autofocus></div>
        <div class="field">
          <label>Link (np. BoardGameGeek)</label>
          <input id="f-bgg" type="url" value="${escapeHtml(g.bggUrl || '')}" placeholder="https://boardgamegeek.com/boardgame/...">
          <div class="file-preview-row" style="margin-top:6px">
            <button type="button" class="btn btn-outline" id="f-bgg-fetch" style="padding:6px 10px">⬇ Pobierz okładkę z BGG</button>
          </div>
          <div class="field-hint" id="f-bgg-status"></div>
        </div>
        <div class="field">
          <label>Zdjęcie okładki (opcjonalnie, ręcznie)</label>
          <input id="f-cover" type="file" accept="image/*">
          <div class="file-preview-row" id="f-cover-preview" style="${pendingCover ? '' : 'display:none'}">
            <img id="f-cover-img" src="${pendingCover}" alt="Podgląd"><button type="button" id="f-cover-clear">Usuń zdjęcie</button>
          </div>
          <div class="field-hint">Zdjęcie zostanie automatycznie pomniejszone.</div>
        </div>
        <div class="field"><label>Notatka (opcjonalnie)</label><input id="f-notes" value="${escapeHtml(g.notes)}"></div>
      </div>
      <div class="modal-foot">
        <button class="delete-link" id="f-delete">🗑 Usuń</button>
        <button class="btn btn-dark" id="f-save">Zapisz</button>
      </div>
    </div>
  `);
  document.getElementById('f-bgg-fetch').onclick = async () => {
    const url = document.getElementById('f-bgg').value.trim();
    const statusEl = document.getElementById('f-bgg-status');
    statusEl.style.color = '';
    statusEl.textContent = 'Szukam okładki...';
    try {
      const imgUrl = await fetchBggCover(url);
      pendingCover = imgUrl;
      document.getElementById('f-cover-img').src = imgUrl;
      document.getElementById('f-cover-preview').style.display = 'flex';
      statusEl.textContent = '✓ Znaleziono okładkę';
    } catch (err) {
      statusEl.style.color = '#A8483A';
      statusEl.textContent = '⚠ ' + err.message + ' — możesz wgrać zdjęcie ręcznie poniżej.';
    }
  };
  document.getElementById('f-cover').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      pendingCover = await resizeImageFile(file, 240);
      document.getElementById('f-cover-img').src = pendingCover;
      document.getElementById('f-cover-preview').style.display = 'flex';
    } catch (err) {
      alert('Nie udało się wczytać zdjęcia: ' + err.message);
    }
  };
  document.getElementById('f-cover-clear').onclick = () => {
    pendingCover = "";
    document.getElementById('f-cover').value = "";
    document.getElementById('f-cover-preview').style.display = 'none';
  };
  document.getElementById('f-save').onclick = () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return;
    g.name = name;
    g.notes = document.getElementById('f-notes').value.trim();
    g.bggUrl = document.getElementById('f-bgg').value.trim();
    g.coverImage = pendingCover;
    closeModal();
    writeGames();
  };
  document.getElementById('f-delete').onclick = () => {
    games = games.filter(x => x.id !== id);
    closeModal();
    writeGames();
  };
}

function openBorrow(id) {
  const g = games.find(x => x.id === id);
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">Wypożycz: ${escapeHtml(g.name)}</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>Kto wypożycza</label><input id="f-borrower" placeholder="Imię i nazwisko" autofocus></div>
        <div class="field"><label>Termin zwrotu (opcjonalnie)</label><input id="f-due" type="date"></div>
      </div>
      <div class="modal-foot" style="justify-content:flex-end">
        <button class="btn btn-green" id="f-confirm">Potwierdź wypożyczenie</button>
      </div>
    </div>
  `);
  document.getElementById('f-confirm').onclick = () => {
    const borrower = document.getElementById('f-borrower').value.trim();
    if (!borrower) return;
    g.status = 'borrowed';
    g.borrower = borrower;
    g.borrowedDate = todayStr();
    g.dueDate = document.getElementById('f-due').value;
    closeModal();
    writeGames();
  };
}

function returnGame(id) {
  const g = games.find(x => x.id === id);
  g.status = 'available';
  g.borrower = '';
  g.borrowedDate = '';
  g.dueDate = '';
  writeGames();
}

function openQr(id) {
  const g = games.find(x => x.id === id);
  const url = shareUrl(id);
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(url)}&color=1F2A24&bgcolor=F0EAD9`;
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">${escapeHtml(g.name)}</h2><button onclick="closeModal()">✕</button></div>
      <div class="qr-body">
        <img src="${qrSrc}" width="200" height="200" alt="QR">
        <div class="qr-url">${url}</div>
        <div class="qr-hint">Wydrukuj i nalep na pudełko gry. Zeskanowanie otworzy tę stronę z podświetloną grą.</div>
      </div>
    </div>
  `);
}

document.getElementById('addBtn').onclick = openAdd;
document.getElementById('searchInput').oninput = (e) => { query = e.target.value; render(); };
document.getElementById('shareBtn').onclick = () => {
  const base = window.location.href.split('#')[0];
  navigator.clipboard?.writeText(base).then(() => {
    const btn = document.getElementById('shareBtn');
    const old = btn.textContent;
    btn.textContent = 'Skopiowano!';
    setTimeout(() => btn.textContent = old, 2000);
  });
};

// Nasłuchiwanie zmian w czasie rzeczywistym - to jest sedno synchronizacji
gamesRef.on('value', (snapshot) => {
  const val = snapshot.val();
  if (val === null) {
    // Baza pusta - wgrywamy dane startowe tylko przy pierwszym uruchomieniu
    if (firstLoad) {
      games = [
        { id: uid(), name: "Nemesis: Odwet", status: "available", borrower: "", borrowedDate: "", dueDate: "", notes: "", bggUrl: "", coverImage: "" },
        { id: uid(), name: "Gloomhaven", status: "available", borrower: "", borrowedDate: "", dueDate: "", notes: "", bggUrl: "", coverImage: "" },
      ];
      writeGames();
    }
  } else {
    games = Array.isArray(val) ? val.filter(Boolean) : Object.values(val);
  }
  firstLoad = false;
  document.getElementById('saveErrorBox').style.display = 'none';
  render();
}, (error) => {
  document.getElementById('saveErrorBox').style.display = 'block';
  document.getElementById('saveErrorBox').textContent = '⚠️ Błąd połączenia z bazą danych: ' + error.message;
});

// Podświetlenie gry z kodu QR
window.addEventListener('load', () => {
  const tryHighlight = () => {
    const hash = window.location.hash.replace('#g-', '');
    if (!hash) return;
    const el = document.getElementById('card-' + hash);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.outline = '2px solid #B8935F';
      el.style.outlineOffset = '2px';
    }
  };
  setTimeout(tryHighlight, 800);
});

} // koniec bloku CONFIGURED
</script>
