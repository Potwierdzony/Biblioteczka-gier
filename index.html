<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteczka Gier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1F2A24;
    --card: #F0EAD9;
    --card-alt: #E6DFC8;
    --border: #3A4A3E;
    --border-card: #C9BFA5;
    --gold: #B8935F;
    --green: #4F7A57;
    --red: #A8483A;
    --muted: #6B7A70;
    --ink: #1F2A24;
    --ink-muted: #6B6555;
    --label: #8A8270;
  }
  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    margin: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .display { font-family: 'Fraunces', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
  .eyebrow { display:flex; align-items:center; gap:8px; margin-bottom:4px; color: var(--gold); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  h1 { color: var(--card); font-weight: 600; font-size: 40px; margin: 0; }
  .author-tag { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 400; color: var(--muted); margin-left: 4px; vertical-align: middle; }
  .sub { color: var(--muted); font-size: 12px; margin-top: 8px; }

  .btn { border: none; cursor: pointer; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 10px 16px; display:inline-flex; align-items:center; gap:6px; }
  .btn-gold { background: var(--gold); color: var(--bg); font-weight: 500; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gold); }
  .btn-dark { background: var(--ink); color: var(--card); font-weight: 500; }
  .btn-green { background: var(--green); color: var(--card); font-weight: 500; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .header-actions { display:flex; flex-wrap: wrap; gap:8px; align-items:center; justify-content: flex-end; }

  .search-wrap { position: relative; margin-bottom: 24px; }
  .search-wrap input {
    width: 100%; padding: 12px 12px 12px 36px; border-radius: 6px;
    background: #25322B; border: 1px solid var(--border); color: var(--card); font-size: 14px; outline:none;
  }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .empty { text-align: center; padding: 60px 0; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

  .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-top { padding: 16px 16px 12px; display:flex; justify-content:space-between; gap:12px; border-bottom: 1px dashed var(--border-card); }
  .card-top-main { display:flex; gap:12px; min-width:0; }
  .card-thumb { width: 56px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-card); flex-shrink: 0; background: var(--card-alt); }
  .card-thumb-placeholder { width: 56px; height: 72px; border-radius: 6px; border: 1px dashed var(--border-card); flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size: 20px; color: var(--label); background: var(--card-alt); }
  .card-top h3 { margin:0; color: var(--ink); font-size: 20px; font-weight: 600; }
  .card-top p { margin: 4px 0 0; color: var(--ink-muted); font-size: 12px; }
  .card-top a.bgg-link { display:inline-flex; align-items:center; gap:4px; margin-top: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold); text-decoration: none; }
  .card-top a.bgg-link:hover { text-decoration: underline; }
  .meta-row { display:flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .category-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.03em;
    padding: 2px 8px; border-radius: 20px; background: var(--ink); color: var(--card);
  }
  .tag-chip {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 2px 8px; border-radius: 20px; background: transparent; color: var(--ink-muted); border: 1px solid var(--border-card);
  }
  .edit-btn { background:none; border:none; cursor:pointer; color: var(--label); padding: 4px; flex-shrink: 0; }

  .card-body { padding: 12px 16px; }
  .status-row { display:flex; justify-content:space-between; align-items:center; }
  .status-available { color: var(--green); font-size: 12px; font-family: 'JetBrains Mono', monospace; display:flex; align-items:center; gap:6px; }
  .status-borrowed { color: var(--gold); font-size: 12px; font-family: 'JetBrains Mono', monospace; display:flex; align-items:center; gap:6px; }
  .status-overdue { color: var(--red); }
  .borrow-info { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4A4536; margin-top: 8px; line-height: 1.6; }
  .borrow-info b { color: var(--ink); font-weight: 500; }

  .card-footer { padding: 10px 16px; background: var(--card-alt); display:flex; justify-content:space-between; align-items:center; }
  .card-footer span { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--label); }
  .qr-btn { background: none; border: none; cursor: pointer; display:flex; align-items:center; gap:6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(15,20,17,0.7); display:flex; align-items:center; justify-content:center; padding: 16px; z-index: 100; }
  .modal { background: var(--card); border-radius: 10px; width: 100%; max-width: 380px; overflow:hidden; }
  .modal-head { padding: 16px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px dashed var(--border-card); }
  .modal-head h2 { margin:0; font-size: 18px; color: var(--ink); font-weight: 600; }
  .modal-head button { background:none; border:none; cursor:pointer; color: var(--label); }
  .modal-body { padding: 16px 20px; display:flex; flex-direction:column; gap:12px; }
  .field label { font-family:'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing:0.05em; color: var(--label); }
  .field input {
    width: 100%; margin-top: 4px; padding: 8px 10px; border-radius: 6px;
    border: 1px solid var(--border-card); font-size: 14px; outline: none; font-family: 'Inter', sans-serif; color: var(--ink);
  }
  .field input[type="file"] { padding: 6px 8px; font-size: 12px; }
  .field textarea {
    width: 100%; margin-top: 4px; padding: 8px 10px; border-radius: 6px;
    border: 1px solid var(--border-card); font-size: 13px; outline: none; font-family: 'JetBrains Mono', monospace; color: var(--ink);
    resize: vertical; min-height: 140px;
  }
  .file-preview-row { display:flex; align-items:center; gap:10px; margin-top: 6px; }
  .file-preview-row img { width: 44px; height: 58px; object-fit: cover; border-radius: 5px; border: 1px solid var(--border-card); }
  .file-preview-row button { background:none; border:none; cursor:pointer; color: var(--red); font-family:'JetBrains Mono', monospace; font-size: 11px; }
  .field-hint { font-size: 11px; color: var(--label); margin-top: 3px; }
  .modal-foot { padding: 16px 20px; border-top: 1px dashed var(--border-card); display:flex; justify-content:space-between; align-items:center; }
  .delete-link { background:none; border:none; cursor:pointer; color: var(--red); font-family:'JetBrains Mono', monospace; font-size:12px; display:flex; align-items:center; gap:5px; }

  .qr-body { padding: 24px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .qr-body img { border-radius: 6px; }
  .qr-url { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--label); text-align:center; word-break: break-all; padding: 0 8px; }
  .qr-hint { font-size: 12px; color: var(--ink-muted); text-align:center; padding: 0 16px; }

  .save-error { margin-bottom: 20px; padding: 8px 16px; border-radius: 6px; background: #3A2320; color: #E8A99B; font-family:'JetBrains Mono', monospace; font-size: 12px; }
  .config-error { max-width: 900px; margin: 60px auto; padding: 24px; background: #F0EAD9; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #1F2A24; line-height: 1.7; }
  .config-error code { background: #E6DFC8; padding: 2px 6px; border-radius: 4px; }
  .sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#4F7A57; margin-right:6px; }
  .sync-dot.offline { background: #A8483A; }
  .viewer-badge {
    display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono', monospace; font-size: 12px;
    color: var(--muted); background: #25322B; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px;
  }
  .viewer-badge .viewer-dot { width:7px; height:7px; border-radius:50%; background:#4F7A57; box-shadow: 0 0 0 0 rgba(79,122,87,0.6); animation: pulse 2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(79,122,87,0.5); }
    70% { box-shadow: 0 0 0 6px rgba(79,122,87,0); }
    100% { box-shadow: 0 0 0 0 rgba(79,122,87,0); }
  }

  /* ---- Motyw jasny ---- */
  body.light {
    --bg: #EDE6D6;
    --card: #FFFFFF;
    --card-alt: #F3EEE0;
    --border: #D9D0BA;
    --border-card: #E0D8C0;
    --gold: #9C7538;
    --green: #3F6B49;
    --red: #A8483A;
    --muted: #8A8270;
    --ink: #1F2A24;
    --ink-muted: #6B6555;
    --label: #8A8270;
    --heading: #1F2A24;
  }
  :root { --heading: #F0EAD9; }
  h1 { color: var(--heading); }
  body.light .search-wrap input { background: #fff; color: var(--ink); border-color: var(--border-card); }
  body.light .search-icon { color: var(--label); }
  body.light .viewer-badge { background: #fff; }
  body.light .shelf-tile .shelf-name { color: var(--heading); }
  body.light .sub { color: var(--ink-muted); }

  /* ---- Pasek kontrolek (sortowanie / filtry / widok) ---- */
  .controls-row { display:flex; flex-wrap: wrap; gap: 8px; align-items:center; margin-bottom: 14px; }
  select.ctrl-select {
    font-family:'JetBrains Mono', monospace; font-size: 12px; padding: 8px 10px; border-radius: 6px;
    background: #25322B; border: 1px solid var(--border); color: var(--card); outline:none; cursor:pointer;
  }
  body.light select.ctrl-select { background: #fff; color: var(--ink); border-color: var(--border-card); }
  .view-toggle { display:flex; border: 1px solid var(--border); border-radius: 6px; overflow:hidden; }
  .view-toggle button {
    border:none; background: transparent; color: var(--muted); font-family:'JetBrains Mono', monospace; font-size: 12px;
    padding: 8px 12px; cursor:pointer;
  }
  .view-toggle button.active { background: var(--gold); color: var(--bg); }
  .group-toggle-label {
    display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); cursor:pointer;
  }

  .filter-panel {
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 16px; padding: 12px; border-radius: 8px;
    background: #25322B; border: 1px solid var(--border);
  }
  body.light .filter-panel { background: #fff; border-color: var(--border-card); }
  .filter-panel button.clear-filters {
    background:none; border: 1px solid var(--border); color: var(--muted); font-family:'JetBrains Mono', monospace;
    font-size: 11px; padding: 8px 10px; border-radius: 6px; cursor:pointer;
  }

  /* ---- Grupowanie po kategorii ---- */
  .group-header {
    font-family:'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--gold); margin: 26px 0 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--border);
  }
  .group-header:first-child { margin-top: 0; }

  /* ---- Widok półki ---- */
  .shelf-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 16px; }
  .shelf-tile { cursor:pointer; text-align:center; }
  .shelf-tile .shelf-img, .shelf-tile .shelf-placeholder {
    width:100%; aspect-ratio: 3/4; object-fit:cover; border-radius: 8px; border: 1px solid var(--border);
  }
  .shelf-tile .shelf-placeholder { display:flex; align-items:center; justify-content:center; font-size: 26px; background: var(--card-alt); color: var(--label); }
  .shelf-tile .shelf-name { margin-top: 7px; font-size: 12px; font-weight: 500; line-height: 1.3; color: var(--heading); }
  .shelf-status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }

  /* ---- Historia wypożyczeń ---- */
  .history-row { display:flex; justify-content:space-between; gap: 10px; font-family:'JetBrains Mono', monospace; font-size: 12px; padding: 7px 0; border-bottom: 1px dashed var(--border-card); color: var(--ink); }
  .history-row:last-child { border-bottom: none; }
  .history-row span { color: var(--ink-muted); white-space:nowrap; }
  .loan-count { color: var(--label); }

  /* ---- Animacje modali ---- */
  .modal-overlay { opacity: 0; transition: opacity 0.18s ease; }
  .modal-overlay.show { opacity: 1; }
  .modal { transform: scale(0.94) translateY(8px); transition: transform 0.18s ease; }
  .modal-overlay.show .modal { transform: scale(1) translateY(0); }

  /* ---- Hover na kartach ---- */
  .card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
  .shelf-tile { transition: transform 0.15s ease; }
  .shelf-tile:hover { transform: translateY(-3px); }
  .shelf-tile img, .shelf-tile .shelf-placeholder { transition: box-shadow 0.15s ease; }
  .shelf-tile:hover .shelf-img, .shelf-tile:hover .shelf-placeholder { box-shadow: 0 6px 16px rgba(0,0,0,0.3); }

  /* ---- Płynne przejście przy zmianie widoku/filtrów ---- */
  #results { transition: opacity 0.15s ease; }
  #results.fading { opacity: 0; }

  /* ---- Skeleton loading ---- */
  .skeleton-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; height: 150px; overflow:hidden; position:relative; }
  .skeleton-line { background: var(--card-alt); border-radius: 4px; margin-bottom: 10px; position:relative; overflow:hidden; }
  .skeleton-line::after {
    content:""; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  /* ---- Pusty stan ---- */
  .empty { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .empty .empty-icon { font-size: 34px; opacity: 0.6; }

  /* ---- Konfetti przy zwrocie ---- */
  .confetti-piece {
    position: fixed; top: -10px; width: 8px; height: 8px; border-radius: 2px; pointer-events:none; z-index: 999;
    animation: confetti-fall 1.1s ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(90vh) rotate(400deg); opacity: 0; }
  }

  /* ---- Panel statystyk ---- */
  .stats-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-box { background: #25322B; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  body.light .stat-box { background: #fff; border-color: var(--border-card); }
  .stat-box .stat-label { font-family:'JetBrains Mono', monospace; font-size: 10px; text-transform:uppercase; letter-spacing:0.05em; color: var(--muted); }
  .stat-box .stat-value { font-family:'Fraunces', serif; font-size: 18px; font-weight: 600; color: var(--heading); margin-top: 4px; line-height:1.3; }
  body.light .stat-box .stat-value { color: var(--ink); }

  /* ---- Oś czasu wypożyczeń ---- */
  .timeline-wrap { margin-bottom: 20px; }
  .timeline-title { font-family:'JetBrains Mono', monospace; font-size: 11px; text-transform:uppercase; letter-spacing:0.05em; color: var(--muted); margin-bottom: 8px; }
  .timeline-strip { display:flex; gap: 10px; overflow-x:auto; padding-bottom: 4px; }
  .timeline-chip {
    flex-shrink:0; display:flex; align-items:center; gap:8px; background: var(--card); border: 1px solid var(--border-card);
    border-radius: 20px; padding: 6px 12px 6px 6px; cursor:pointer;
  }
  .timeline-chip .tc-info { font-size: 11px; font-family:'JetBrains Mono', monospace; color: var(--ink); line-height:1.3; }
  .timeline-chip .tc-info b { color: var(--ink); }
  .timeline-chip .tc-info span { color: var(--ink-muted); display:block; }

  /* ---- Awatar inicjałów ---- */
  .avatar {
    display:inline-flex; align-items:center; justify-content:center; width: 22px; height: 22px; border-radius:50%;
    font-family:'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: #fff; flex-shrink:0;
  }
  .avatar-lg { width: 28px; height: 28px; font-size: 11px; }

  /* ---- Walidacja i licznik znaków ---- */
  .field-error { color: var(--red); font-size: 11px; margin-top: 3px; display:none; }
  .field.invalid input { border-color: var(--red); }
  .field.invalid .field-error { display:block; }
  .char-counter { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--label); text-align:right; margin-top: 3px; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); } 80% { transform: translateX(3px); }
  }
  .shake { animation: shake 0.3s ease; }

  /* ---- Potwierdzenie usunięcia ---- */
  .confirm-body { padding: 20px; text-align:center; }
  .confirm-body p { font-size: 14px; color: var(--ink); margin: 0 0 16px; }
  .confirm-actions { display:flex; gap:10px; justify-content:center; }
  /* ---- Poprawki dla telefonów / wąskich ekranów ---- */
  @media (max-width: 600px) {
    .wrap { padding: 24px 14px; }
    h1 { font-size: 28px; }
    .author-tag { display: block; margin-left: 0; margin-top: 3px; }
    header { gap: 12px; }
    .header-actions { justify-content: flex-start; width: 100%; }
    .header-actions .btn { padding: 8px 12px; font-size: 11px; }
    .viewer-badge { font-size: 11px; padding: 5px 10px; }
    .controls-row { width: 100%; }
    .controls-row > * { flex: 1 1 auto; }
    select.ctrl-select { min-width: 0; }
    .view-toggle, .group-toggle-label { flex: 0 0 auto; }
    .filter-panel { flex-direction: column; }
    .filter-panel select.ctrl-select { width: 100%; }
    .filter-panel button.clear-filters { width: 100%; }
    .stats-row { grid-template-columns: 1fr; }
    .modal { max-width: 94vw; }
    .modal-foot { flex-wrap: wrap; gap: 10px; }
    .card-footer { flex-wrap: wrap; gap: 8px; }
    .shelf-grid { grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">🎲 <span>Katalog wypożyczeń</span></div>
      <h1 class="display">Biblioteczka Gier <span class="author-tag">by Artur Oleksiak</span></h1>
      <p class="sub mono" id="subCount"><span class="sync-dot offline" id="syncDot"></span>Łączenie z bazą danych...</p>
    </div>
    <div class="header-actions">
      <span class="viewer-badge" id="viewerBadge" style="display:none"><span class="viewer-dot"></span><span id="viewerCount"></span></span>
      <button class="btn btn-outline" id="themeToggle" title="Zmień motyw">☀️</button>
      <button class="btn btn-outline" id="shareBtn">🔗 Udostępnij</button>
      <button class="btn btn-outline" id="importBtn">📋 Import listy</button>
      <button class="btn btn-gold" id="addBtn">+ Dodaj grę</button>
    </div>
  </header>

  <div id="saveErrorBox" style="display:none" class="save-error">⚠️ Nie udało się zapisać zmian w bazie danych.</div>

  <div class="stats-row" id="statsRow" style="display:none"></div>

  <div class="timeline-wrap" id="timelineWrap" style="display:none">
    <div class="timeline-title">👀 Aktualnie wypożyczone</div>
    <div class="timeline-strip" id="timelineStrip"></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" placeholder="Szukaj gry, osoby, kategorii, tagu (#RPG) lub czasu (1h)...">
  </div>

  <div class="controls-row">
    <select class="ctrl-select" id="sortSelect">
      <option value="default">Sortuj: domyślnie</option>
      <option value="name">Nazwa A-Z</option>
      <option value="popularity">Najpopularniejsze</option>
      <option value="duration">Czas trwania</option>
      <option value="players">Liczba graczy</option>
    </select>
    <button class="btn btn-outline" id="filterToggleBtn">🎛 Filtry</button>
    <div class="view-toggle">
      <button id="viewListBtn">📋 Lista</button>
      <button class="active" id="viewShelfBtn">🖼 Półka</button>
    </div>
    <label class="group-toggle-label">
      <input type="checkbox" id="groupByCategory"> Grupuj wg kategorii
    </label>
  </div>

  <div class="filter-panel" id="filterPanel" style="display:none">

function fmtDate(d) {

  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("pl-PL", { day: "2-digit", month: "short", year: "numeric" });

function daysUntil(d) {
  if (!d) return null;
  const today = new Date(todayStr() + "T00:00:00");

function resizeImageFile(file, maxWidth) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Nie udało się odczytać pliku'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Nieprawidłowy plik graficzny'));
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function extractBggId(url) {
  const m = String(url).match(/boardgamegeek\.com\/(?:boardgame|boardgameexpansion)\/(\d+)/i);
  return m ? m[1] : null;
}

async function fetchBggCover(bggUrl) {
  const id = extractBggId(bggUrl);
  if (!id) throw new Error('To nie wygląda na link do gry na BoardGameGeek (np. boardgamegeek.com/boardgame/12345/nazwa)');
  const apiUrl = `https://boardgamegeek.com/xmlapi2/thing?id=${id}`;

  const proxies = [
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(apiUrl)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`,
  ];

  let lastError = null;
  for (const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error('Serwer proxy odpowiedział błędem: ' + res.status);
      let text = await res.text();
      // allorigins /get zwraca JSON z polem "contents" zawierającym oryginalny XML jako string
      if (proxyUrl.includes('allorigins.win/get')) {
        const parsed = JSON.parse(text);
        text = parsed.contents;
      }
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const imageEl = xml.querySelector('image');
      if (!imageEl || !imageEl.textContent.trim()) throw new Error('Nie znaleziono zdjęcia dla tej gry');
      return imageEl.textContent.trim();
    } catch (err) {
      lastError = err;
    }
  }
  throw new Error('Nie udało się połączyć z BGG (' + (lastError?.message || 'nieznany błąd') + ')');
}

function parseDurationHours(d) {
  const m = String(d || "").match(/(\d+(\.\d+)?)/);
  return m ? parseFloat(m[1]) : 999;
}
function parsePlayersMax(p) {
  const nums = String(p || "").match(/\d+/g);
  return nums ? Math.max(...nums.map(Number)) : 999;
}
function sortGames(list) {
  const arr = [...list];
  if (sortBy === "name") arr.sort((a, b) => a.name.localeCompare(b.name, "pl"));
  else if (sortBy === "popularity") arr.sort((a, b) => (b.history || []).length - (a.history || []).length);
  else if (sortBy === "duration") arr.sort((a, b) => parseDurationHours(a.duration) - parseDurationHours(b.duration));
  else if (sortBy === "players") arr.sort((a, b) => parsePlayersMax(a.players) - parsePlayersMax(b.players));
  return arr;
}

function populateFilterOptions() {
  const build = (id, values, prefix) => {
    const sel = document.getElementById(id);
    const current = sel.value;
    const opts = [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "pl"));
    sel.innerHTML = `<option value="">${prefix}: wszystkie</option>` + opts.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
    if (opts.includes(current)) sel.value = current;
  };
  build("filterCategory", games.map(g => g.category), "Kategoria");
  build("filterDuration", games.map(g => g.duration), "Czas");
  build("filterPlayers", games.map(g => g.players), "Gracze");
}

function matchesFilters(g) {
  if (filters.status && g.status !== filters.status) return false;
  if (filters.category && (g.category || "") !== filters.category) return false;
  if (filters.duration && (g.duration || "") !== filters.duration) return false;
  if (filters.players && (g.players || "") !== filters.players) return false;
  return true;
}

function updateStats() {
  const box = document.getElementById('statsRow');
  if (games.length === 0) { box.style.display = 'none'; return; }

  // Najpopularniejsza gra (najwięcej wypożyczeń w historii)
  let popular = null;
  games.forEach(g => {
    const c = (g.history || []).length;
    if (c > 0 && (!popular || c > popular.count)) popular = { name: g.name, count: c };
  });

  // Najdłużej wypożyczona obecnie
  let longest = null;
  games.forEach(g => {
    if (g.status === 'borrowed' && g.borrowedDate) {
      const days = Math.max(0, -daysUntil(g.borrowedDate));
      if (!longest || days > longest.days) longest = { name: g.name, days };
    }
  });

  // Łączna liczba wypożyczeń w tym miesiącu
  const now = new Date();
  const ym = now.toISOString().slice(0, 7);
  let monthCount = 0;
  games.forEach(g => {
    (g.history || []).forEach(h => { if ((h.borrowedDate || '').startsWith(ym)) monthCount++; });
    if (g.status === 'borrowed' && (g.borrowedDate || '').startsWith(ym)) monthCount++;
  });

  box.style.display = 'grid';
  box.innerHTML = `
    <div class="stat-box"><div class="stat-label">🏆 Najpopularniejsza</div><div class="stat-value">${popular ? escapeHtml(popular.name) : '—'}</div></div>
    <div class="stat-box"><div class="stat-label">⏳ Najdłużej wypożyczona</div><div class="stat-value">${longest ? escapeHtml(longest.name) + ` (${longest.days} dni)` : '—'}</div></div>
    <div class="stat-box"><div class="stat-label">📅 Wypożyczeń w tym miesiącu</div><div class="stat-value">${monthCount}</div></div>
  `;
}

function updateTimeline() {
  const wrap = document.getElementById('timelineWrap');
  const strip = document.getElementById('timelineStrip');
  const borrowed = games.filter(g => g.status === 'borrowed').sort((a, b) => (a.borrowedDate || '').localeCompare(b.borrowedDate || ''));
  if (borrowed.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  strip.innerHTML = borrowed.map(g => `
    <div class="timeline-chip" onclick="openQuickActions('${g.id}')">
      ${avatarHtml(g.borrower, 'lg')}
      <div class="tc-info"><b>${escapeHtml(g.borrower)}</b><span>${escapeHtml(g.name)} · od ${fmtDate(g.borrowedDate)}</span></div>
    </div>
  `).join('');
}

function render() {
  const results = document.getElementById('results');
  const empty = document.getElementById('emptyState');
  const q = query.trim().toLowerCase();

  updateStats();
  updateTimeline();

  let filtered = games.filter(g =>
    (!q || g.name.toLowerCase().includes(q) || (g.borrower || "").toLowerCase().includes(q)
      || (g.category || "").toLowerCase().includes(q) || (g.tags || "").toLowerCase().includes(q)
      || (g.duration || "").toLowerCase().includes(q) || (g.players || "").toLowerCase().includes(q))
    && matchesFilters(g)
  );
  filtered = sortGames(filtered);

  const out = games.filter(g => g.status === 'borrowed').length;
  document.getElementById('subCount').innerHTML =
    `<span class="sync-dot" id="syncDot"></span>${games.length} pozycji w katalogu · ${out} obecnie wypożyczonych`;

  populateFilterOptions();

  results.classList.add('fading');
  setTimeout(() => {
    if (filtered.length === 0) {
      empty.style.display = 'block';
      empty.innerHTML = games.length === 0
        ? `<span class="empty-icon">🎲</span>Katalog jest pusty. Dodaj pierwszą grę.`
        : `<span class="empty-icon">🔍</span>Brak wyników pasujących do wyszukiwania lub filtrów.`;
      results.innerHTML = '';
      results.classList.remove('fading');
      return;
    }
    empty.style.display = 'none';

    const wrapClass = viewMode === 'shelf' ? 'shelf-grid' : 'grid';
    const tileFn = viewMode === 'shelf' ? shelfTileHtml : cardHtml;

    if (groupByCat) {
      const map = new Map();
      filtered.forEach(g => {
        const key = g.category && g.category.trim() ? g.category.trim() : 'Bez kategorii';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(g);
      });
      results.innerHTML = [...map.entries()].map(([cat, list]) => `
        <div class="group-header">${escapeHtml(cat)} (${list.length})</div>
        <div class="${wrapClass}">${list.map(tileFn).join('')}</div>
      `).join('');
    } else {
      results.innerHTML = `<div class="${wrapClass}">${filtered.map(tileFn).join('')}</div>`;
    }
    results.classList.remove('fading');
  }, 90);
}

  overlay.addEventListener('click', (e) => {
    if (e.target.id === 'overlay') closeModal();

    if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
      e.preventDefault();
      const primary = overlay.querySelector('.btn-dark, .btn-green');
      if (primary) primary.click();
    }
  });
}

  const overlay = document.getElementById('overlay');

function avatarColor(name) {
  const palette = ['#B8935F', '#4F7A57', '#A8483A', '#6B7A8F', '#8F6B8A', '#7A8F4F'];
  let hash = 0;
  for (const ch of String(name || '')) hash = (hash * 31 + ch.charCodeAt(0)) % 997;
  return palette[hash % palette.length];
}

      statusEl.textContent = '✓ Znaleziono okładkę';
    } catch (err) {
      statusEl.style.color = '#A8483A';
      statusEl.textContent = '⚠ ' + err.message + ' — możesz wgrać zdjęcie ręcznie poniżej.';
    }
  };
  document.getElementById('f-cover').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      pendingCover = await resizeImageFile(file, 240);
      document.getElementById('f-cover-img').src = pendingCover;
      document.getElementById('f-cover-preview').style.display = 'flex';
    } catch (err) {
      alert('Nie udało się wczytać zdjęcia: ' + err.message);
    }
  };
  document.getElementById('f-cover-clear').onclick = () => {
    pendingCover = "";
    document.getElementById('f-cover').value = "";
    document.getElementById('f-cover-preview').style.display = 'none';
  };
  document.getElementById('f-save').onclick = () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) {
      const field = document.getElementById('f-name-field');
      field.classList.add('invalid', 'shake');
      document.getElementById('f-name').focus();
      setTimeout(() => field.classList.remove('shake'), 300);
      return;
    }
    const notes = document.getElementById('f-notes').value.trim();
    const bggUrl = document.getElementById('f-bgg').value.trim();
    const category = document.getElementById('f-category').value.trim();
    const duration = document.getElementById('f-duration').value.trim();
    const players = document.getElementById('f-players').value.trim();
    const tags = document.getElementById('f-tags').value.trim();
    games.push({ id: uid(), name, status: 'available', borrower: '', borrowedDate: '', dueDate: '', notes, bggUrl, coverImage: pendingCover, category, duration, players, tags, history: [] });
    closeModal();
    writeGames();
  };
}

function openEdit(id) {
  const g = games.find(x => x.id === id);
  let pendingCover = g.coverImage || "";
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">Edytuj grę</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field" id="f-name-field"><label>Nazwa gry</label><input id="f-name" value="${escapeHtml(g.name)}" autofocus><div class="field-error">Nazwa gry jest wymagana</div></div>
        <div class="field">
          <label>Link (np. BoardGameGeek)</label>
          <input id="f-bgg" type="url" value="${escapeHtml(g.bggUrl || '')}" placeholder="https://boardgamegeek.com/boardgame/...">
          <div class="file-preview-row" style="margin-top:6px">
            <button type="button" class="btn btn-outline" id="f-bgg-fetch" style="padding:6px 10px">⬇ Pobierz okładkę z BGG</button>
          </div>
          <div class="field-hint" id="f-bgg-status"></div>
        </div>
        <div class="field">
          <label>Zdjęcie okładki (opcjonalnie, ręcznie)</label>
          <input id="f-cover" type="file" accept="image/*">
          <div class="file-preview-row" id="f-cover-preview" style="${pendingCover ? '' : 'display:none'}">
            <img id="f-cover-img" src="${pendingCover}" alt="Podgląd"><button type="button" id="f-cover-clear">Usuń zdjęcie</button>
          </div>
          <div class="field-hint">Zdjęcie zostanie automatycznie pomniejszone.</div>
        </div>
        <div class="field"><label>Notatka (opcjonalnie)</label><input id="f-notes" maxlength="140" value="${escapeHtml(g.notes)}"><div class="char-counter" id="f-notes-counter">${(g.notes||'').length}/140</div></div>
        <div style="display:flex; gap:10px">
          <div class="field" style="flex:1"><label>Kategoria</label><input id="f-category" value="${escapeHtml(g.category || '')}" placeholder="np. Łatwa / Trudna"></div>
          <div class="field" style="flex:1"><label>Czas trwania</label><input id="f-duration" value="${escapeHtml(g.duration || '')}" placeholder="np. 1h / 3h"></div>
        </div>
        <div class="field"><label>Liczba graczy</label><input id="f-players" value="${escapeHtml(g.players || '')}" placeholder="np. 2-4"></div>
        <div class="field"><label>Tagi</label><input id="f-tags" value="${escapeHtml(g.tags || '')}" placeholder="np. #imprezowa #kooperacja"></div>
      </div>
      <div class="modal-foot">
        <button class="delete-link" id="f-delete">🗑 Usuń</button>
        <button class="btn btn-dark" id="f-save">Zapisz</button>
      </div>
    </div>
  `);
  document.getElementById('f-notes').oninput = (e) => { document.getElementById('f-notes-counter').textContent = e.target.value.length + '/140'; };
  document.getElementById('f-bgg-fetch').onclick = async () => {
    const url = document.getElementById('f-bgg').value.trim();
    const statusEl = document.getElementById('f-bgg-status');
    statusEl.style.color = '';
    statusEl.textContent = 'Szukam okładki...';
    try {
      const imgUrl = await fetchBggCover(url);
      pendingCover = imgUrl;
      document.getElementById('f-cover-img').src = imgUrl;
      document.getElementById('f-cover-preview').style.display = 'flex';
      statusEl.textContent = '✓ Znaleziono okładkę';
    } catch (err) {
      statusEl.style.color = '#A8483A';
      statusEl.textContent = '⚠ ' + err.message + ' — możesz wgrać zdjęcie ręcznie poniżej.';
    }
  };
  document.getElementById('f-cover').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      pendingCover = await resizeImageFile(file, 240);
      document.getElementById('f-cover-img').src = pendingCover;
      document.getElementById('f-cover-preview').style.display = 'flex';
    } catch (err) {
      alert('Nie udało się wczytać zdjęcia: ' + err.message);
    }
  };
  document.getElementById('f-cover-clear').onclick = () => {
    pendingCover = "";
    document.getElementById('f-cover').value = "";
    document.getElementById('f-cover-preview').style.display = 'none';
  };
  document.getElementById('f-save').onclick = () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) {
      const field = document.getElementById('f-name-field');
      field.classList.add('invalid', 'shake');
      document.getElementById('f-name').focus();
      setTimeout(() => field.classList.remove('shake'), 300);
      return;
    }
    g.name = name;
    g.notes = document.getElementById('f-notes').value.trim();
    g.bggUrl = document.getElementById('f-bgg').value.trim();
    g.category = document.getElementById('f-category').value.trim();
    g.duration = document.getElementById('f-duration').value.trim();
    g.players = document.getElementById('f-players').value.trim();
    g.tags = document.getElementById('f-tags').value.trim();
    g.coverImage = pendingCover;
    closeModal();
    writeGames();
  };
  document.getElementById('f-delete').onclick = () => {
    confirmAction(`Usunąć grę „${g.name}” z katalogu? Tej operacji nie można cofnąć.`, () => {
      games = games.filter(x => x.id !== id);
      writeGames();
    });
  };
}

function openBorrow(id) {
  const g = games.find(x => x.id === id);
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">Wypożycz: ${escapeHtml(g.name)}</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>Kto wypożycza</label><input id="f-borrower" placeholder="Imię i nazwisko" autofocus></div>
        <div class="field"><label>Termin zwrotu (opcjonalnie)</label><input id="f-due" type="date"></div>
      </div>
      <div class="modal-foot" style="justify-content:flex-end">
        <button class="btn btn-green" id="f-confirm">Potwierdź wypożyczenie</button>
      </div>
    </div>
  `);
  document.getElementById('f-confirm').onclick = () => {
    const borrower = document.getElementById('f-borrower').value.trim();
    if (!borrower) return;
    g.status = 'borrowed';
    g.borrower = borrower;
    g.borrowedDate = todayStr();
    g.dueDate = document.getElementById('f-due').value;
    closeModal();
    writeGames();
  };
}

function returnGame(id) {
  const g = games.find(x => x.id === id);
  if (!g.history) g.history = [];
  if (g.borrower) {
    g.history.push({ borrower: g.borrower, borrowedDate: g.borrowedDate, returnedDate: todayStr() });
  }
  g.status = 'available';
  g.borrower = '';
  g.borrowedDate = '';
  g.dueDate = '';
  writeGames();
  spawnConfetti();
}

function openHistory(id) {
  const g = games.find(x => x.id === id);
  const hist = (g.history || []).slice().reverse();
  const rows = hist.length
    ? hist.map(h => `<div class="history-row"><span style="display:flex;align-items:center;gap:6px;color:var(--ink)">${avatarHtml(h.borrower)}<b>${escapeHtml(h.borrower)}</b></span><span>${fmtDate(h.borrowedDate)} → ${fmtDate(h.returnedDate)}</span></div>`).join('')
    : `<div class="field-hint">Brak historii wypożyczeń.</div>`;
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">Historia: ${escapeHtml(g.name)}</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field-hint" style="margin-bottom:2px">Wypożyczano łącznie ${hist.length} ${hist.length === 1 ? 'raz' : 'razy'}.</div>
        ${rows}
      </div>
    </div>
  `);
}

function openQuickActions(id) {
  const g = games.find(x => x.id === id);
  const overdue = g.status === 'borrowed' && g.dueDate && daysUntil(g.dueDate) < 0;
  const loanCount = (g.history || []).length;
  openModal(`
    <div class="modal">
      ${g.coverImage ? `<img src="${g.coverImage}" alt="Okładka" style="width:100%; max-height:220px; object-fit:cover; display:block;">` : ''}
      <div class="modal-head"><h2 class="display">${escapeHtml(g.name)}</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        ${g.notes ? `<p style="margin:0; font-size:13px; color:var(--ink-muted)">${escapeHtml(g.notes)}</p>` : ''}
        ${g.bggUrl ? `<a class="bgg-link" href="${escapeHtml(g.bggUrl)}" target="_blank" rel="noopener">🔗 Zasady / opis gry</a>` : ''}
        ${(g.category || g.duration || g.players || g.tags) ? `
          <div class="meta-row">
            ${g.category ? `<span class="category-badge">${escapeHtml(g.category)}</span>` : ''}
            ${g.duration ? `<span class="category-badge" style="background:var(--green)">⏱ ${escapeHtml(g.duration)}</span>` : ''}
            ${g.players ? `<span class="category-badge" style="background:var(--gold); color:var(--ink)">👥 ${escapeHtml(g.players)}</span>` : ''}
            ${(g.tags || '').split(/[\s,]+/).filter(Boolean).map(t => `<span class="tag-chip">${escapeHtml(t.startsWith('#') ? t : '#' + t)}</span>`).join('')}
          </div>` : ''}
        <div style="margin-top:10px">
        ${g.status === 'available'
          ? `<div class="status-available">✓ Dostępna</div>`
          : `<div class="borrow-info" style="display:flex; align-items:center; gap:8px">${avatarHtml(g.borrower)}<span><span class="status-borrowed ${overdue ? 'status-overdue' : ''}">${overdue ? '⚠ Zaległy zwrot' : '⏱ Wypożyczona'}</span><br>Kto: <b>${escapeHtml(g.borrower)}</b><br>Od: ${fmtDate(g.borrowedDate)}${g.dueDate ? ' · do: ' + fmtDate(g.dueDate) : ''}</span></div>`}
        </div>
        ${loanCount ? `<div class="loan-count" style="margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:11px">Wypożyczano łącznie ${loanCount}x</div>` : ''}
      </div>
      <div class="modal-foot">
        <div style="display:flex; gap:14px">
          <button class="qr-btn" onclick="openHistory('${id}')">🕑 Historia</button>
          <button class="qr-btn" onclick="openQr('${id}')">▦ QR</button>
          <button class="edit-btn" onclick="openEdit('${id}')" title="Edytuj">✎</button>
        </div>
        ${g.status === 'available'
          ? `<button class="btn btn-dark" onclick="openBorrow('${id}')">Wypożycz</button>`
          : `<button class="btn btn-green" onclick="returnGame('${id}'); closeModal()">↺ Zwrot</button>`}
      </div>
    </div>
  `);
}

function openQr(id) {
  const g = games.find(x => x.id === id);
  const url = shareUrl(id);
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(url)}&color=1F2A24&bgcolor=F0EAD9`;
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">${escapeHtml(g.name)}</h2><button onclick="closeModal()">✕</button></div>
      <div class="qr-body">
        <img src="${qrSrc}" width="200" height="200" alt="QR">
        <div class="qr-url">${url}</div>
        <div class="qr-hint">Wydrukuj i nalep na pudełko gry. Zeskanowanie otworzy tę stronę z podświetloną grą.</div>
      </div>
    </div>
  `);
}

function openImport() {
  openModal(`
    <div class="modal">
      <div class="modal-head"><h2 class="display">Import listy gier</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field">
          <label>Wklej nazwy gier (po jednej w linii)</label>
          <textarea id="f-import" placeholder="SETI
Na dnie morza
Brzdęk: Katakumby
..."></textarea>
        </div>
        <div class="field-hint" id="f-import-status">Gry zostaną dopisane do istniejącej listy — nic nie zostanie skasowane ani nadpisane.</div>
      </div>
      <div class="modal-foot" style="justify-content:flex-end">
        <button class="btn btn-dark" id="f-import-save">Dodaj gry</button>
      </div>
    </div>
  `);
  document.getElementById('f-import-save').onclick = () => {
    const raw = document.getElementById('f-import').value;
    const names = raw.split('\n').map(s => s.trim()).filter(Boolean);
    if (names.length === 0) return;
    const existingNames = new Set(games.map(g => g.name.trim().toLowerCase()));
    let added = 0, skipped = 0;
    names.forEach(name => {
      if (existingNames.has(name.toLowerCase())) { skipped++; return; }
      games.push({
        id: uid(), name, status: 'available', borrower: '', borrowedDate: '', dueDate: '',
        notes: '', bggUrl: '', coverImage: '', category: '', duration: '', players: '', tags: '', history: []
      });
      existingNames.add(name.toLowerCase());
      added++;
    });
    closeModal();
    writeGames();
    setTimeout(() => alert(`Dodano ${added} gier.${skipped ? ' Pominięto ' + skipped + ' (już były na liście).' : ''}`), 300);
  };
}

document.getElementById('addBtn').onclick = openAdd;
document.getElementById('importBtn').onclick = openImport;
document.getElementById('searchInput').oninput = (e) => { query = e.target.value; render(); };
function filterBy(value) {
  query = value;
  document.getElementById('searchInput').value = value;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('sortSelect').onchange = (e) => { sortBy = e.target.value; render(); };

document.getElementById('viewListBtn').onclick = () => {
  viewMode = 'list';
  document.getElementById('viewListBtn').classList.add('active');
  document.getElementById('viewShelfBtn').classList.remove('active');
  render();
};
document.getElementById('viewShelfBtn').onclick = () => {
  viewMode = 'shelf';
  document.getElementById('viewShelfBtn').classList.add('active');
  document.getElementById('viewListBtn').classList.remove('active');
  render();
};

document.getElementById('groupByCategory').onchange = (e) => { groupByCat = e.target.checked; render(); };

document.getElementById('filterToggleBtn').onclick = () => {
  const panel = document.getElementById('filterPanel');
  panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
};
document.getElementById('filterStatus').onchange = (e) => { filters.status = e.target.value; render(); };
document.getElementById('filterCategory').onchange = (e) => { filters.category = e.target.value; render(); };
document.getElementById('filterDuration').onchange = (e) => { filters.duration = e.target.value; render(); };
document.getElementById('filterPlayers').onchange = (e) => { filters.players = e.target.value; render(); };
document.getElementById('clearFiltersBtn').onclick = () => {
  filters = { status: "", category: "", duration: "", players: "" };
  ['filterStatus', 'filterCategory', 'filterDuration', 'filterPlayers'].forEach(id => document.getElementById(id).value = "");
  render();
};

const THEME_KEY = 'biblioteczka-gier-theme';
function applyTheme(theme) {
  document.body.classList.toggle('light', theme === 'light');
  document.getElementById('themeToggle').textContent = theme === 'light' ? '🌙' : '☀️';
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
document.getElementById('themeToggle').onclick = () => {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
};
document.getElementById('shareBtn').onclick = () => {
  const base = window.location.href.split('#')[0];
  navigator.clipboard?.writeText(base).then(() => {
    const btn = document.getElementById('shareBtn');
    const old = btn.textContent;
    btn.textContent = 'Skopiowano!';
    setTimeout(() => btn.textContent = old, 2000);
  });
};

// Nasłuchiwanie zmian w czasie rzeczywistym - to jest sedno synchronizacji
// Śledzenie liczby osób aktualnie przeglądających stronę
const presenceListRef = db.ref('presence');
const myPresenceRef = presenceListRef.push();
db.ref('.info/connected').on('value', (snap) => {
  if (snap.val() === true) {
    myPresenceRef.onDisconnect().remove();
    myPresenceRef.set(true);
  }
});
presenceListRef.on('value', (snap) => {
  const count = snap.numChildren();
  const badge = document.getElementById('viewerBadge');
  const countEl = document.getElementById('viewerCount');
  if (count > 0) {
    countEl.textContent = count === 1 ? '1 osoba przegląda' : count + ' osób przegląda';
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
});

gamesRef.on('value', (snapshot) => {
  const wasFirstLoad = firstLoad;
  const val = snapshot.val();
  if (val === null) {
    // Baza pusta - wgrywamy dane startowe tylko przy pierwszym uruchomieniu
    if (firstLoad) {
      games = [
        { id: uid(), name: "Nemesis: Odwet", status: "available", borrower: "", borrowedDate: "", dueDate: "", notes: "", bggUrl: "", coverImage: "" },
        { id: uid(), name: "Gloomhaven", status: "available", borrower: "", borrowedDate: "", dueDate: "", notes: "", bggUrl: "", coverImage: "" },
      ];
      writeGames();
    }
  } else {
    games = Array.isArray(val) ? val.filter(Boolean) : Object.values(val);
  }
  firstLoad = false;
  document.getElementById('saveErrorBox').style.display = 'none';
  render();
  if (wasFirstLoad) handleQrDeepLink();
}, (error) => {
  document.getElementById('saveErrorBox').style.display = 'block';
  document.getElementById('saveErrorBox').textContent = '⚠️ Błąd połączenia z bazą danych: ' + error.message;
});

// Obsługa linku z kodu QR (#g-ID) - otwiera pełne okno szczegółów gry,
// działa niezależnie od trybu widoku (Lista / Półka)
function handleQrDeepLink() {
  const hash = window.location.hash.replace('#g-', '');
  if (!hash) return;
  const g = games.find(x => x.id === hash);
  if (!g) return;
  setTimeout(() => {
    openQuickActions(hash);
    const el = document.getElementById('card-' + hash);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.outline = '2px solid #B8935F';
      el.style.outlineOffset = '2px';
    }
  }, 250);
}

} // koniec bloku CONFIGURED
